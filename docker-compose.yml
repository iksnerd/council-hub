services:
  council-hub:
    image: iksnerd/council-hub:latest
    ports:
      - "4000:4000"
      - "3001:3001"
      - "4369:4369"
      - "9000:9000"
    volumes:
      - council-data:/data
    environment:
      - COUNCIL_TRANSPORT=http
      # Shared cluster secret — all nodes must use the same value
      - RELEASE_COOKIE=${COUNCIL_COOKIE:-council_secret_cookie}
      # Must include a reachable LAN IP, e.g. council_hub@192.168.1.10
      # The entrypoint will auto-detect if left as the loopback default,
      # but setting it explicitly is recommended for stable clustering.
      - RELEASE_NODE=${COUNCIL_NODE_NAME:-council_hub@127.0.0.1}
      # Peers to connect to: bare IP (192.168.1.11), MagicDNS name (bob), or full node@ip.
      # Omit for LAN auto-discovery. Set COUNCIL_NO_DISCOVER=1 to skip scan on VPN.
      - COUNCIL_SEEDS=${COUNCIL_SEEDS:-}
      - COUNCIL_NO_DISCOVER=${COUNCIL_NO_DISCOVER:-0}
      # Ollama endpoint for semantic search (optional)
      - COUNCIL_OLLAMA_URL=${COUNCIL_OLLAMA_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  council-data:
