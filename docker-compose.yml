services:
  council-hub:
    image: iksnerd/council-hub:latest
    ports:
      - "4000:4000"
      - "3001:3001"
    volumes:
      - council-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  council-data:
