services:
  council-hub:
    image: iksnerd/council-hub:latest
    ports:
      - "4000:4000"
      - "3001:3001"
      - "4369:4369"
      - "9000:9000"
    volumes:
      - council-data:/data
    environment:
      # To form a cluster, provide the same cookie to all nodes
      - RELEASE_COOKIE=${COUNCIL_COOKIE:-council_secret_cookie}
      # The node name must be unique and include the IP/hostname (e.g. alice@10.0.0.5)
      - RELEASE_NODE=${COUNCIL_NODE_NAME:-council_hub@127.0.0.1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  council-data:

