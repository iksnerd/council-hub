version: 2
updates:
  - package-ecosystem: gomod
    directory: /mcp-server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - "area: mcp-server"

  - package-ecosystem: mix
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - "area: ui"

  - package-ecosystem: npm
    directory: /channel-plugin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - "area: channel-plugin"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
