name: Docker Release

on:
  push:
    tags: [ "v*.*.*" ]

jobs:
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=iksnerd/council-hub:${VERSION},iksnerd/council-hub:latest" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=registry,ref=iksnerd/council-hub:buildcache
          cache-to: type=registry,ref=iksnerd/council-hub:buildcache,mode=max

      - name: Update Docker Hub description
        run: |
          echo "Docker image pushed successfully as:"
          echo "  iksnerd/council-hub:${{ steps.meta.outputs.version }}"
          echo "  iksnerd/council-hub:latest"
