name: CI

on:
  # Runs only on version tags to conserve GitHub Actions quota.
  # Trade-off: PRs and main pushes are not tested by CI; run tests locally
  # (make test / mix test) before tagging a release.
  push:
    tags: [ "v*.*.*" ]

jobs:
  go-ci:
    name: Go Tests and Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-server
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache-dependency-path: mcp-server/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: mcp-server

      - name: Run Go tests
        run: CGO_ENABLED=1 go test -tags sqlite_fts5 -v ./...

  elixir-ci:
    name: Elixir Tests and Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.x'
          otp-version: '28.x'

      - name: Cache dependencies and build
        uses: actions/cache@v5
        with:
          path: |
            ui/deps
            ui/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('ui/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check unused deps
        run: mix deps.unlock --check-unused

      - name: Check code formatting
        run: mix format --check-formatted

      - name: Run Elixir tests
        run: mix test
