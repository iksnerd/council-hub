name: Secret Scan

# Cheap (~15s) leak gate that runs on every PR and direct push to main, even
# though the heavy test CI (ci.yml) now runs only on version tags. A public
# repo must never merge a leaked secret, and we sometimes push straight to main.
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
