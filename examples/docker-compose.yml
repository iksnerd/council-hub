version: '3.8'

services:
  council-hub:
    image: iksnerd/council-hub:latest
    ports:
      - "4000:4000"  # Web UI
      - "3001:3001"  # MCP Server
    volumes:
      - council-hub-data:/data
    environment:
      COUNCIL_TRANSPORT: http
      COUNCIL_DB: /data/council.db
      COUNCIL_DB_PATH: /data/council.db
      # Uncomment to enable semantic search:
      # COUNCIL_OLLAMA_URL: http://host.docker.internal:11434
      # COUNCIL_EMBED_MODEL: embeddinggemma:300m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Uncomment to run Ollama for semantic search (macOS/Linux)
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   environment:
  #     OLLAMA_HOST: 0.0.0.0:11434

volumes:
  council-hub-data:
  # ollama-data:

# Usage:
# docker-compose up -d
#
# Web UI: http://localhost:4000
# MCP endpoint: http://localhost:3001/mcp
#
# To enable semantic search:
# 1. Uncomment the ollama service below
# 2. Uncomment COUNCIL_OLLAMA_URL lines in council-hub environment
# 3. Run: ollama pull embeddinggemma:300m
# 4. Restart: docker-compose up -d
